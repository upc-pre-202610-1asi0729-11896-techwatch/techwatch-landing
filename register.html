<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — TechWatch</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="https://upload.wikimedia.org/wikipedia/commons/f/fc/UPC_logo_transparente.png">
</head>
<body class="auth-page" data-page="register">
<header class="header header--auth">
    <div class="div-header">
        <a href="index.html" class="brand-link" data-i18n-aria="meta.brandHome" aria-label="TechWatch home">
            <img class="icon-img" src="https://upload.wikimedia.org/wikipedia/commons/f/fc/UPC_logo_transparente.png" alt="">
            <p class="title-logo">Techwatch</p>
        </a>

        <nav class="navbar" aria-label="Main" data-i18n-aria="meta.navMain">
            <div class="navbar-links">
                <a href="index.html#hero" class="nav-link" data-i18n="nav.hero">Hero</a>
                <a href="index.html#feature" class="nav-link" data-i18n="nav.features">Features</a>
                <a href="index.html#about" class="nav-link" data-i18n="nav.about">About us</a>
                <a href="index.html#pricing" class="nav-link" data-i18n="nav.pricing">Pricing</a>
                <a href="index.html#testimonials" class="nav-link" data-i18n="nav.reviews">Reviews</a>
                <a href="index.html#contact" class="nav-link" data-i18n="nav.contact">Contact</a>
                <a href="login.html" class="nav-link" data-i18n="nav.login">Login</a>
                <a href="register.html" class="nav-link" data-i18n="nav.register">Register</a>
            </div>
        </nav>

        <div class="navbar-actions">
            <div class="lang-switch" role="group" data-i18n-aria="meta.langGroup" aria-label="Language">
                <button type="button" class="lang-btn lang-btn--active" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="es">ES</button>
            </div>
            <a href="login.html" class="btn-nav btn-nav--ghost" data-i18n="nav.login">Login</a>
            <a href="register.html" class="btn-nav btn-nav--primary" data-i18n="nav.register">Register</a>
        </div>
    </div>

    <section class="auth-panel" aria-labelledby="register-title">
        <div class="auth-card">
            <h1 id="register-title" data-i18n="auth.registerTitle">Create account</h1>
            <form class="auth-form" action="#" method="get">
                <label>
                    <span data-i18n="auth.fullNameLabel">Full name</span>
                    <input type="text" name="name" autocomplete="name" data-i18n-placeholder="auth.namePlaceholder" placeholder="Your name">
                </label>
                <label>
                    <span data-i18n="auth.emailLabel">Email</span>
                    <input type="email" name="email" autocomplete="email" data-i18n-placeholder="auth.emailPlaceholder" placeholder="you@example.com">
                </label>
                <label>
                    <span data-i18n="auth.passwordLabel">Password</span>
                    <input type="password" name="password" autocomplete="new-password" data-i18n-placeholder="auth.passwordPlaceholder" placeholder="••••••••">
                </label>
                <label>
                    <span data-i18n="auth.confirmPasswordLabel">Confirm password</span>
                    <input type="password" name="password_confirm" autocomplete="new-password" data-i18n-placeholder="auth.passwordPlaceholder" placeholder="••••••••">
                </label>
                <button class="btn-primary auth-submit" type="submit" data-i18n="auth.submitRegister">Register</button>
            </form>
            <p class="auth-footer-row"><span data-i18n="auth.footerHasAccount">Already have an account?</span> <a href="login.html" data-i18n="auth.footerLogin">Log in</a></p>
        </div>
    </section>
</header>

<footer class="footer footer--compact">
    <div class="container-footer">
        <p class="footer-copy" data-i18n="footer.copy">© 2026 TechWatch. All rights reserved.</p>
    </div>
</footer>
<script src="./i18n.js"></script>
</body>
</html>
