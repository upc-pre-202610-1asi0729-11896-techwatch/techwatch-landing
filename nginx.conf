server {
    # Railway auto-detects port 8080 and routes over IPv6, so listen on both.
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Serve static files; allow extension-less paths to resolve to .html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
